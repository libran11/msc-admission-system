# 使用方式（与其他成员共用同一 GitHub 仓库时）：
# 1. 复制本文件为同目录下的 application-local.yml
# 2. 修改下面的密码为你本机 MySQL 密码
# 3. application-local.yml 已在 .gitignore 中，不会被 git 提交
#
# 若启动报错 Unknown database 'msc_admission_system'，在 MySQL 中执行：
#   CREATE DATABASE IF NOT EXISTS msc_admission_system CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#
#   Windows PowerShell（当前会话）：$env:SPRING_DATASOURCE_PASSWORD='你的密码'

spring:
  datasource:
    # 与本机不一致时再改用户名
    username: root
    password: '请改成你本机的 MySQL 密码'
